<!DOCTYPE html>

<head>

<title>Zgadnij ocenę Dawida</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent: #e94560;
  --accent2: #0f3460;
  --gold: #f5c518;
  --text: #eee;
  --text-dim: #888;
  --success: #2ecc71;
  --fail: #e74c3c;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.container { max-width: 700px; margin: 0 auto; padding: 20px; }

.header { text-align: center; padding: 40px 0 20px; }

.header h1 {
  font-size: 2rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.header p { color: var(--text-dim); margin-top: 8px; font-size: 0.95rem; }

.progress-bar { width: 100%; height: 6px; background: var(--card); border-radius: 3px; margin: 20px 0; overflow: hidden; }

.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 3px; transition: width 0.5s ease; }

.stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; }

.stats .score { color: var(--gold); font-weight: 700; }

.movie-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: slideUp 0.4s ease; }

@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

.movie-top { display: flex; gap: 20px; padding: 24px; }

.poster-wrap { flex-shrink: 0; width: 140px; height: 210px; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }

.poster-wrap img { width: 100%; height: 100%; object-fit: cover; }

.movie-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }

.movie-info h2 { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }

.movie-info .original-title { font-size: 0.85rem; color: var(--text-dim); font-style: italic; }

.movie-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }

.meta-badge { background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; color: var(--text-dim); }

.movie-desc { font-size: 0.9rem; color: #ccc; line-height: 1.5; margin-top: 8px; }

.rating-section { padding: 20px 24px 28px; border-top: 1px solid rgba(255,255,255,0.06); }

.rating-label { text-align: center; font-size: 0.9rem; color: var(--text-dim); margin-bottom: 14px; }

.rating-buttons { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }

.rating-btn {
  width: 52px; height: 52px; border: 2px solid rgba(255,255,255,0.12); background: transparent;
  color: var(--text); font-size: 1.1rem; font-weight: 700; border-radius: 12px;
  cursor: pointer; transition: all 0.2s ease; font-family: 'Inter', sans-serif;
}

.rating-btn:hover { border-color: var(--gold); background: rgba(245,197,24,0.1); transform: scale(1.1); }

.rating-btn:active { transform: scale(0.95); }

.rating-btn.correct { background: var(--success); border-color: var(--success); color: #fff; animation: pop 0.3s ease; }

.rating-btn.wrong { background: var(--fail); border-color: var(--fail); color: #fff; opacity: 0.7; }

.rating-btn.actual { border-color: var(--gold); background: rgba(245,197,24,0.2); color: var(--gold); box-shadow: 0 0 12px rgba(245,197,24,0.3); }

@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

.result-feedback { text-align: center; padding: 16px; font-size: 1.1rem; font-weight: 700; animation: fadeIn 0.3s ease; }

.result-feedback.correct { color: var(--success); }

.result-feedback.wrong { color: var(--fail); }

.result-feedback .detail { font-size: 0.85rem; font-weight: 400; color: var(--text-dim); margin-top: 4px; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.next-btn {
  display: block; margin: 16px auto 0; padding: 12px 32px;
  background: linear-gradient(135deg, var(--accent), #c0392b); color: #fff;
  border: none; border-radius: 10px; font-size: 1rem; font-weight: 600;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: transform 0.2s;
}

.next-btn:hover { transform: scale(1.05); }

.final-screen { text-align: center; padding: 60px 20px; animation: slideUp 0.5s ease; }

.final-screen .big-score {
  font-size: 5rem; font-weight: 900;
  background: linear-gradient(135deg, var(--gold), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.final-screen .subtitle { font-size: 1.2rem; color: var(--text-dim); margin: 12px 0 30px; }

.final-screen .breakdown { display: flex; justify-content: center; gap: 24px; margin-bottom: 30px; }

.breakdown-item { text-align: center; }

.breakdown-item .num { font-size: 2rem; font-weight: 700; }

.breakdown-item .label { font-size: 0.8rem; color: var(--text-dim); }

.breakdown-item.exact .num { color: var(--success); }

.breakdown-item.close .num { color: var(--gold); }

.breakdown-item.off .num { color: var(--fail); }

.restart-btn {
  padding: 14px 40px; background: linear-gradient(135deg, var(--accent), var(--gold)); color: #fff;
  border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; font-family: 'Inter', sans-serif; transition: transform 0.2s;
}

.restart-btn:hover { transform: scale(1.05); }

.start-screen { text-align: center; padding: 60px 20px; }

.start-screen .emoji { font-size: 4rem; margin-bottom: 20px; }

.start-screen h2 { font-size: 1.5rem; margin-bottom: 12px; }

.start-screen p { color: var(--text-dim); margin-bottom: 30px; line-height: 1.6; }

.mode-buttons { display: flex; flex-direction: column; gap: 12px; max-width: 320px; margin: 0 auto; }

.mode-btn {
  padding: 16px; border: 2px solid rgba(255,255,255,0.1); background: var(--card);
  color: var(--text); border-radius: 12px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s;
}

.mode-btn:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }

.mode-btn .mode-title { font-size: 1.1rem; font-weight: 700; }

.mode-btn .mode-desc { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }

@media (max-width: 500px) {
  .movie-top { flex-direction: column; align-items: center; text-align: center; }
  .poster-wrap { width: 160px; height: 240px; }
  .movie-meta { justify-content: center; }
  .rating-btn { width: 44px; height: 44px; font-size: 1rem; }
  .header h1 { font-size: 1.6rem; }
}
</style>

": 5, "director": "Y&oacute;rgos L&aacute;nthimos", "description": "Pojawienie się na angielskim dworze nowej służącej Abigail zaczyna zagrażać pozycji lady Sary, która rządzi krajem w zastępstwie schorowanej królowej..."}, {"id": 73, "title": "Jackie Brown", "originalTitle": "", "year": 1997, "posterPath": "/00/73/73/7986554_1.$.jpg", "rating": 8, "director": "Quentin Tarantino", "description": "Stewardessa przyłapana na nielegalnym przewożeniu pieniędzy z Meksyku do Los Angeles rozpoczyna grę między agentami FBI a handlarzem broni, dla którego pracowała."}, {"id": 299113, "title": "Avatar", "originalTitle": "Avatar", "year": 2009, "posterPath": "/91/13/299113/8028716_1.$.jpg", "rating": 6, "director": "James Cameron", "description": "Jake, sparaliżowany były komandos, zostaje wysłany na planetę Pandora, gdzie zaprzyjaźnia się z lokalną społecznością i postanawia jej pomóc."}];

const POSTER_BASE = "https://fwcdn.pl/fpo";

function getPosterUrl(p) {
  return p ? POSTER_BASE + p.replace(".$.", ".3.") : "";
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = { screen: "start" };

function startGame(count) {
  state = {
    screen: "game", movies: shuffle(MOVIES).slice(0, count),
    current: 0, score: 0, exact: 0, close: 0, off: 0,
    answered: false, totalQuestions: count, results: [],
  };
  render();
}

function answer(guess) {
  if (state.answered) return;
  state.answered = true;
  const actual = state.movies[state.current].rating;
  const diff = Math.abs(guess - actual);
  let points = 0;
  if (diff === 0) { points = 3; state.exact++; }
  else if (diff === 1) { points = 1; state.close++; }
  else { state.off++; }
  state.score += points;
  state.results.push({ guess, actual, diff, points });
  render();
}

function nextQuestion() {
  state.current++;
  state.answered = false;
  if (state.current >= state.totalQuestions) state.screen = "final";
  render();
}

function getScoreMessage(pct) {
  if (pct >= 90) return "Znasz Dawida lepiej ni\u017c on sam!";
  if (pct >= 70) return "Prawie jak Dawid!";
  if (pct >= 50) return "Nie\u017ale, znasz jego gust!";
  if (pct >= 30) return "Jeszcze troch\u0119 i b\u0119dziesz ekspertem!";
  return "Dawid jest trudny do odgadni\u0119cia!";
}

function render() {
  const app = document.getElementById("app");

  if (state.screen === "start") {
    app.innerHTML = `
      <div class="start-screen">
        <div class="emoji">\ud83c\udfac</div>
        <h2>Jak dobrze znasz gust filmowy Dawida?</h2>
        <p>Dawid oceni\u0142 100 film\u00f3w na Filmwebie.<br>Spr\u00f3buj zgadn\u0105\u0107 jakie oceny wystawi\u0142!</p>
        <p style="font-size:0.8rem;color:var(--text-dim)">
          \ud83c\udfaf Trafienie = 3 pkt &nbsp;|&nbsp; \u00b11 = 1 pkt &nbsp;|&nbsp; Pud\u0142o = 0 pkt
        </p>
        <div class="mode-buttons">
          <button class="mode-btn" onclick="startGame(10)">
            <div class="mode-title">Szybka gra</div>
            <div class="mode-desc">10 film\u00f3w</div>
          </button>
          <button class="mode-btn" onclick="startGame(25)">
            <div class="mode-title">Klasyczna gra</div>
            <div class="mode-desc">25 film\u00f3w</div>
          </button>
          <button class="mode-btn" onclick="startGame(MOVIES.length)">
            <div class="mode-title">Maraton</div>
            <div class="mode-desc">Wszystkie ${MOVIES.length} film\u00f3w</div>
          </button>
        </div>
      </div>
    `;
    return;
  }

  if (state.screen === "final") {
    const maxScore = state.totalQuestions * 3;
    const pct = Math.round((state.score / maxScore) * 100);
    app.innerHTML = `
      <div class="final-screen">
        <div class="big-score">${state.score}/${maxScore}</div>
        <div class="subtitle">${getScoreMessage(pct)} (${pct}%)</div>
        <div class="breakdown">
          <div class="breakdown-item exact">
            <div class="num">${state.exact}</div>
            <div class="label">\ud83c\udfaf Trafione</div>
          </div>
          <div class="breakdown-item close">
            <div class="num">${state.close}</div>
            <div class="label">\ud83d\udd25 Blisko (\u00b11)</div>
          </div>
          <div class="breakdown-item off">
            <div class="num">${state.off}</div>
            <div class="label">\u274c Pud\u0142o</div>
          </div>
        </div>
        <button class="restart-btn" onclick="state.screen='start';render()">Zagraj ponownie</button>
      </div>
    `;
    return;
  }

  const movie = state.movies[state.current];
  const progress = ((state.current + (state.answered ? 1 : 0)) / state.totalQuestions) * 100;
  const posterUrl = getPosterUrl(movie.posterPath);
  const result = state.answered ? state.results[state.results.length - 1] : null;

  let buttonsHtml = "";
  for (let i = 1; i <= 10; i++) {
    let cls = "rating-btn";
    if (state.answered) {
      if (result.guess === i && result.diff === 0) cls += " correct";
      else if (result.guess === i && result.diff > 0) cls += " wrong";
      if (movie.rating === i && result.diff > 0) cls += " actual";
    }
    buttonsHtml += `<button class="${cls}" onclick="answer(${i})" ${state.answered ? "disabled" : ""}>${i}</button>`;
  }

  let feedbackHtml = "";
  if (state.answered) {
    if (result.diff === 0) {
      feedbackHtml = `<div class="result-feedback correct">\ud83c\udfaf Trafione! +3 pkt</div>`;
    } else if (result.diff === 1) {
      feedbackHtml = `<div class="result-feedback wrong">\ud83d\udd25 Blisko! Dawid da\u0142 <strong>${movie.rating}</strong> (+1 pkt)</div>`;
    } else {
      feedbackHtml = `<div class="result-feedback wrong">\u274c Dawid da\u0142 <strong>${movie.rating}</strong><div class="detail">Tw\u00f3j typ: ${result.guess} (r\u00f3\u017cnica: ${result.diff})</div></div>`;
    }
    feedbackHtml += `<button class="next-btn" onclick="nextQuestion()">${state.current + 1 < state.totalQuestions ? "Nast\u0119pny film \u2192" : "Zobacz wynik \u2192"}</button>`;
  }

  const fallback = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#222;color:#555;font-size:3rem">\ud83c\udfac</div>';
  const posterHtml = posterUrl
    ? `<img src="${posterUrl}" alt="${movie.title}" onerror="this.style.display='none';this.parentElement.insertAdjacentHTML('beforeend','${fallback.replace(/'/g,"\\'")}');">`
    : fallback;

  const origTitle = (movie.originalTitle && movie.originalTitle !== movie.title)
    ? `<div class="original-title">${movie.originalTitle}</div>` : "";

  app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="stats">
      <span>Film ${state.current + 1} z ${state.totalQuestions}</span>
      <span class="score">\u2b50 ${state.score} pkt</span>
    </div>
    <div class="movie-card">
      <div class="movie-top">
        <div class="poster-wrap">${posterHtml}</div>
        <div class="movie-info">
          <h2>${movie.title}</h2>
          ${origTitle}
          <div class="movie-meta">
            <span class="meta-badge">\ud83d\udcc5 ${movie.year}</span>
            <span class="meta-badge">\ud83c\udfac ${movie.director}</span>
          </div>
          <div class="movie-desc">${movie.description}</div>
        </div>
      </div>
      <div class="rating-section">
        <div class="rating-label">Jak Dawid oceni\u0142 ten film? (1-10)</div>
        <div class="rating-buttons">${buttonsHtml}</div>
        ${feedbackHtml}
      </div>
    </div>
  `;
}

render();
</script>
